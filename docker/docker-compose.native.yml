services:
  cli:
    image: ${LEGROOM_IMAGE:-ghcr.io/legroom-ai/legroom:latest}
    entrypoint: ["legroom"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      HOME: /tmp/legroom-home
      # Canonical Legroom filesystem contract (issue #175). Forwarded into
      # the container so the proxy resolves state/config to the bind-mounted
      # /tmp/legroom-home/.legroom path. LEGROOM_WORKSPACE (above) remains
      # the Docker bind-mount source and is intentionally different.
      LEGROOM_WORKSPACE_DIR: /tmp/legroom-home/.legroom
      LEGROOM_CONFIG_DIR: /tmp/legroom-home/.legroom/config
      # CLI-filtering dashboard figures require the `rtk` binary inside this
      # container; it is not installed by this image. See docs/content/docs/docker-install.mdx.
    volumes:
      - ${LEGROOM_WORKSPACE:-.}:/workspace
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.legroom:/tmp/legroom-home/.legroom
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.claude:/tmp/legroom-home/.claude
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.codex:/tmp/legroom-home/.codex
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.gemini:/tmp/legroom-home/.gemini
    command: ["--help"]

  proxy:
    image: ${LEGROOM_IMAGE:-ghcr.io/legroom-ai/legroom:latest}
    entrypoint: ["legroom", "proxy"]
    working_dir: /workspace
    restart: unless-stopped
    environment:
      HOME: /tmp/legroom-home
      LEGROOM_HOST: 0.0.0.0
      # Canonical Legroom filesystem contract (issue #175). See `cli` service
      # above for rationale.
      LEGROOM_WORKSPACE_DIR: /tmp/legroom-home/.legroom
      LEGROOM_CONFIG_DIR: /tmp/legroom-home/.legroom/config
      # CLI-filtering dashboard figures require the `rtk` binary inside this
      # container; it is not installed by this image. See docs/content/docs/docker-install.mdx.
    ports:
      - "${LEGROOM_PORT:-8787}:${LEGROOM_PORT:-8787}"
    volumes:
      - ${LEGROOM_WORKSPACE:-.}:/workspace
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.legroom:/tmp/legroom-home/.legroom
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.claude:/tmp/legroom-home/.claude
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.codex:/tmp/legroom-home/.codex
      - ${LEGROOM_HOST_HOME:?set LEGROOM_HOST_HOME}/.gemini:/tmp/legroom-home/.gemini
    command: ["--host", "0.0.0.0", "--port", "${LEGROOM_PORT:-8787}"]
